# 50 users trading against one pool: 70% swaps, 30% liquidity adds. The shared
# Pool resource is the contention source; per-user LpBalance writes are not.
accounts = 50
txns = 2000
seed = 42

[[init]]
function = "0xA11CE::amm::create_pool"
args = [
    { kind = "const_u64", value = 1000000 },
    { kind = "const_u64", value = 1000000 },
]

[[calls]]
function = "0xA11CE::amm::swap"
weight = 70
args = [{ kind = "rand_u64", min = 1, max = 1000 }]

[[calls]]
function = "0xA11CE::amm::add_liquidity"
weight = 30
args = [{ kind = "rand_u64", min = 1, max = 500 }]
